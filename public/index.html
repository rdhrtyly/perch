<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perch</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="wrap">
    <div class="userbar" id="userbar" style="display:none">
      <span class="who" id="userEmail"></span>
      <a class="btn btn-ghost btn-sm" id="statusLink" target="_blank" rel="noopener">📡 Status page</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Log out</button>
    </div>
    <header class="masthead">
      <div class="logo">🪺 Perch</div>
      <h1>Deploy anything</h1>
      <p class="subtitle">Drag in a folder, or push to GitHub. It goes live with HTTPS.</p>
    </header>

    <!-- THE STAR: drag-and-drop upload (no GitHub needed) -->
    <div class="dropzone" id="dropzone">
      <div class="icon">📦</div>
      <p class="big">Drag your site's folder here</p>
      <p class="small">Plain HTML goes live instantly. React/Vite gets built for you.</p>
      <div class="controls">
        <input type="text" id="uploadName" placeholder="site name" />
        <button class="btn btn-primary" id="chooseFolder">Choose folder</button>
        <button class="btn btn-quiet" id="toggleGithub">or add from GitHub →</button>
      </div>
      <input type="file" id="folderInput" class="hidden-file" webkitdirectory directory multiple />
    </div>

    <!-- Secondary: add from a GitHub repo -->
    <form class="addform" id="addForm" style="margin-top:16px">
      <div class="fields">
        <div class="field">
          <label for="name">Project name</label>
          <input id="name" name="name" placeholder="Forkful" required />
          <span class="hint">Becomes forkful.useperch.dev</span>
        </div>
        <div class="field">
          <label for="repo">GitHub repo</label>
          <input id="repo" name="repo" placeholder="rdhrtyly/forkful" required />
          <span class="hint">In the form owner/repo</span>
        </div>
        <div class="field full">
          <label for="branch">Branch (optional)</label>
          <input id="branch" name="branch" placeholder="main" />
        </div>
      </div>
      <div class="submit-row">
        <button type="submit" class="btn btn-primary">Add site</button>
        <button type="button" class="btn btn-ghost" id="addCancel">Cancel</button>
      </div>
    </form>

    <!-- Sites -->
    <section class="section">
      <div class="section-head">
        <h2>Your sites</h2>
        <span class="subtitle" id="siteCount" style="font-size:13px"></span>
      </div>
      <div class="sites" id="sites"></div>
    </section>

    <!-- Domains (Phase 2 — Porkbun) -->
    <section class="section" id="domainsSection" style="display:none">
      <div class="section-head">
        <h2>Buy a domain</h2>
        <span class="subtitle" style="font-size:13px">powered by Porkbun</span>
      </div>
      <div id="domainsBody"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
